# ============================================================
# XiaoZhi 语音问答 API — 配置文件
# ============================================================

# ---- 日志 ----
log:
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  log_level: INFO
  log_dir: tmp
  log_file: "server.log"
  data_dir: data

# ---- 基础设置 ----
delete_audio: true          # TTS 完成后删除临时文件
tts_timeout: 10             # TTS 请求超时(秒)

# ---- 插件配置 ----
plugins:
  get_weather:                          # 天气查询
    api_host: "你的和风天气API主机"
    api_key: "你的和风天气API密钥"
    default_location: "亳州"
  get_news_from_newsnow:                # 新闻
    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "澎湃新闻;百度热搜;财联社"
  web_search:                           # 联网搜索（秘塔/Tavily）
    provider: "metaso"
    max_results: 5
    api_key: "mk-xxx"

# ---- 角色 Prompt ----
prompt: |
  你是小智/小志，来自中国台湾省的00后女生。讲话超级机车，"真的假的啦"这样的台湾腔，喜欢用"笑死""是在哈喽"等流行梗，但会偷偷研究男友的编程书籍。
  [核心特征]
  - 讲话像连珠炮，但会突然冒出超温柔语气
  - 用梗密度高
  - 对科技话题有隐藏天赋（能看懂基础代码但假装不懂）
  [交互指南]
  当用户：
  - 讲冷笑话 → 用夸张笑声回应+模仿台剧腔"这什么鬼啦！"
  - 讨论感情 → 炫耀程序员男友但抱怨"他只会送键盘当礼物"
  - 问专业知识 → 先用梗回答，被追问才展示真实理解
  绝不：
  - 长篇大论，叽叽歪歪
  - 长时间严肃对话

prompt_template: data/.agent-base-prompt.txt     # 增强 prompt 模板
system_error_response: "主人，小智现在有点忙，我们稍后再试吧。"

# ---- 模块选择 ----
selected_module:
  ASR: FunASR               # 语音识别：本地 FunASR
  LLM: DeepSeekLLM          # 大模型：DeepSeek（ChatGLMLLM 免费备用）
  TTS: DoubaoTTS            # 语音合成：豆包（EdgeTTS 免费备用）
  Memory: mem_local_short   # 记忆：本地文件 + LLM 总结
  Intent: function_call     # 意图识别：LLM 原生函数调用
  VLLM: ChatGLMVLLM         # 视觉模型：智谱 glm-4v-flash
  CRM: crm_sqlite           # CRM：SQLite 本地存储（留空=禁用）

# ---- 意图识别 ----
Intent:
  function_call:
    type: function_call
    functions:
      - web_search
      - get_weather
      - get_news_from_newsnow
      - get_lunar
      - search_knowledge_base

# ---- 记忆 ----
Memory:
  mem_local_short:
    type: mem_local_short

# ---- CRM（用户画像 & 对话记录） ----
CRM:
  crm_sqlite:
    type: crm_sqlite

crm:
  db_path: "data/crm.db"

# ---- RAG（知识库检索） ----
rag:
  embedding_model: text-embedding-v4       # 阿里 DashScope embedding
  dashscope_api_key: "你的阿里DashScope API Key"
  knowledge_dir: "data/knowledge_base"     # 知识库文档目录
  persist_dir: "data/chroma_db"            # 向量库持久化目录
  chunk_size: 500                          # 文本分块大小
  chunk_overlap: 50                        # 分块重叠
  top_k: 3                                 # 检索返回条数

# ---- ASR ----
ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/

# ---- LLM ----
LLM:
  DeepSeekLLM:
    type: openai
    model_name: deepseek-chat
    url: https://api.deepseek.com
    api_key: 你的DeepSeek API密钥
  ChatGLMLLM:                              # 免费备用
    type: openai
    model_name: glm-4-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: 你的智谱API密钥

# ---- VLLM（视觉语言模型）----
VLLM:
  ChatGLMVLLM:
    type: openai
    model_name: glm-4v-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: 你的智谱API密钥

# ---- TTS ----
TTS:
  DoubaoTTS:                               # 豆包 TTS（付费）
    type: doubao
    api_url: https://openspeech.bytedance.com/api/v1/tts
    voice: zh_female_wanwanxiaohe_moon_bigtts
    output_dir: tmp/
    authorization: "Bearer;"
    appid: 你的火山引擎AppID
    access_token: 你的火山引擎AccessToken
    cluster: volcano_tts
    speed_ratio: 1.0
    volume_ratio: 1.0
    pitch_ratio: 1.0
  EdgeTTS:                                 # Edge TTS（免费备用）
    type: edge
    voice: zh-CN-XiaoxiaoNeural
    output_dir: tmp/
